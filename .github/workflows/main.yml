name: Build ESPHome

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ESPHome and esptool
        run: pip install esphome esptool

      - name: Build Binary
        run: esphome compile shahar-ai.yaml

      - name: Create Merged Binary
        run: |
          # שימוש ב-flash_args כדי למצוא את כל הנתיבים והכתובות אוטומטית
          cd .esphome/build/shahar-ai
          python -m esptool --chip esp32c3 merge-bin -o ../../../merged_shahar.bin @flashing_args

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: full-firmware
          path: merged_shahar.bin
