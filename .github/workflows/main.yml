name: Build ESPHome BIN

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Cache ESPHome
        uses: actions/cache@v4 # זה התיקון לשגיאה שראינו בצילום המסך
        with:
          path: ~/.esphome
          key: esphome-cache

      - uses: esphome/build-action@v2
        id: esphome-build
        with:
          yaml_file: shahar-ai.yaml
          version: latest
          
      - uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: ${{ steps.esphome-build.outputs.name }}
