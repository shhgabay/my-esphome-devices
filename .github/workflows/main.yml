name: Build ESPHome

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install esphome esptool
      - run: esphome compile shahar-ai.yaml
      - name: Create Merged Binary
        run: |
          BUILD_DIR=".esphome/build/shahar-ai"
          python -m esptool --chip esp32c3 merge-bin -o merged_shahar.bin \
            @$BUILD_DIR/flashing_args
      - uses: actions/upload-artifact@v4
        with:
          name: full-firmware
          path: merged_shahar.bin
