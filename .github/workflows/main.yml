name: Build ESPHome

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ESPHome and esptool
        run: pip install esphome esptool

      - name: Build Binary
        run: esphome compile shahar-ai.yaml

      - name: Create Merged Binary
        run: |
          # בניית פקודת המיזוג ידנית לפי הסטנדרט של ESP32-C3
          BUILD_DIR=".esphome/build/shahar-ai"
          python -m esptool --chip esp32c3 merge-bin -o merged_shahar.bin \
            --flash_mode dio --flash_size 4MB --flash_freq 40m \
            0x0 $BUILD_DIR/.pioenvs/shahar-ai/bootloader.bin \
            0x8000 $BUILD_DIR/.pioenvs/shahar-ai/partitions.bin \
            0x10000 $BUILD_DIR/.pioenvs/shahar-ai/firmware.bin \
            0xe000 $BUILD_DIR/.pioenvs/shahar-ai/ota_data_initial.bin

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: full-firmware
          path: merged_shahar.bin
