esphome:
  name: "shahar-ai"
  friendly_name: "עוזר קולי שחר"

esp32:
  board: esp32-c3-devkitm-1
  variant: esp32c3
  framework:
    type: esp-idf

api:

ota:
  - platform: esphome

wifi:
  networks:
    - ssid: "mmmm"
      password: "0545468640"
      priority: 100

# הגדרות אודיו מה-BIN המקורי
i2s_audio:
  i2s_lrclk_pin: GPIO3
  i2s_bclk_pin: GPIO2

microphone:
  - platform: i2s_audio
    id: board_mic
    i2s_din_pin: GPIO4
    adc_type: external
    pdm: false

speaker:
  - platform: i2s_audio
    id: board_speaker
    i2s_dout_pin: GPIO5
    dac_type: external

# הגדרות מסך ו-I2C מה-BIN המקורי
i2c:
  sda: GPIO10  # שינוי מ-8 ל-10
  scl: GPIO8   # שינוי מ-9 ל-8

display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x64"
    address: 0x3C
    lambda: |-
      it.print(0, 0, id(font_small), "Shahar AI Ready");

font:
  - file: "gfonts://Roboto"
    id: font_small
    size: 12

voice_assistant:
  microphone: board_mic
  speaker: board_speaker
